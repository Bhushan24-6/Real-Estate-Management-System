<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Listings - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .filter-section {
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 30px;
        }
        .property-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            height: 100%;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .property-img-placeholder {
            height: 200px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .price-tag {
            color: #6366f1;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .badge-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="owners.html">Owners</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link" href="properties.html">Properties</a>
                <a class="nav-link active" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link" href="agreements.html">Agreements</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Explore Property Listings</h2>

        <div class="filter-section">
            <form id="filterForm" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Property Type</label>
                    <select class="form-select" id="filterType">
                        <option value="">All Types</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Villa">Villa</option>
                        <option value="Flat">Flat</option>
                        <option value="Office">Office</option>
                        <option value="Shop">Shop</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Min Price (₹)</label>
                    <input type="number" class="form-control" id="minPrice" placeholder="Min Price">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Max Price (₹)</label>
                    <input type="number" class="form-control" id="maxPrice" placeholder="Max Price">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 py-2">Apply Filters</button>
                    <button type="button" onclick="resetFilters()" class="btn btn-outline-secondary ms-2 py-2">Reset</button>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Min Area (sqft)</label>
                    <input type="number" class="form-control" id="minArea" placeholder="Min Area">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Max Area (sqft)</label>
                    <input type="number" class="form-control" id="maxArea" placeholder="Max Area">
                </div>
            </form>
        </div>

        <div class="row" id="listingsGrid">
            <!-- Listings loaded here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
