<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="owners.html">Owners</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link active" href="properties.html">Properties</a>
                <a class="nav-link" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link" href="agreements.html">Agreements</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="mb-4">Add New Property</h2>
                    <form id="propertyForm">
                        <div class="mb-3">
                            <label class="form-label">Property Type</label>
                            <input type="text" class="form-control" id="type" placeholder="e.g. Apartment, Villa" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" placeholder="Property Address" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Area (sqft)</label>
                            <input type="number" class="form-control" id="area" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" class="form-control" id="price" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="status">
                                <option value="Available">Available</option>
                                <option value="Sold">Sold</option>
                                <option value="Under Maintenance">Under Maintenance</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Owner</label>
                            <select class="form-select" id="ownerSelect" required>
                                <option value="">Select Owner</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Agent</label>
                            <select class="form-select" id="agentSelect" required>
                                <option value="">Select Agent</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Property</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
