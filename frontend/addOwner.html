<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Owner - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="owners.html">Owners</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link" href="properties.html">Properties</a>
                <a class="nav-link" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link" href="agreements.html">Agreements</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="mb-4">Add New Owner</h2>
                    <form id="ownerForm">
                        <div class="mb-3">
                            <label class="form-label">Owner Name</label>
                            <input type="text" class="form-control" id="ownerName" placeholder="Full Name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="ownerEmail" placeholder="email@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contact No</label>
                            <input type="text" class="form-control" id="ownerContact" placeholder="Phone Number" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Street</label>
                            <input type="text" class="form-control" id="ownerStreet" placeholder="Street Name/Area">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="ownerCity" placeholder="City">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pincode</label>
                            <input type="text" class="form-control" id="ownerPincode" placeholder="Pincode/Zip Code">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Owner</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
