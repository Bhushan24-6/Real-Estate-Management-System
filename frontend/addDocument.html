<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4">Add Document</h2>
                    <form id="documentForm">
                        <input type="hidden" id="agreementIdInput">
                        <div class="mb-3">
                            <label class="form-label">Document Type</label>
                            <input type="text" class="form-control" id="docType" placeholder="e.g. ID Proof, Property Tax" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Upload/Recording Date</label>
                            <input type="date" class="form-control" id="uploadDate" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Save Document</button>
                        <button type="button" onclick="history.back()" class="btn btn-link w-100 mt-2">Cancel</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Pre-fill hidden Agreement ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const agreementId = urlParams.get('agreementId');
        if (agreementId) {
            document.getElementById('agreementIdInput').value = agreementId;
        } else {
            alert('No agreement specified!');
            history.back();
        }
    </script>
</body>
</html>
