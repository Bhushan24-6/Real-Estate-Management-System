<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Agreement - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="owners.html">Owners</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link" href="properties.html">Properties</a>
                <a class="nav-link" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link active" href="agreements.html">Agreements</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4">Create New Agreement</h2>
                    <form id="agreementForm">
                        <div class="mb-3">
                            <label class="form-label">Select Property</label>
                            <select class="form-select" id="propertySelect" required>
                                <option value="">Select Property</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Agreement Type</label>
                            <input type="text" class="form-control" id="agreementType" placeholder="e.g. Sale Deed, Lease" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="startDate" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" class="form-control" id="endDate" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Create Agreement</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
