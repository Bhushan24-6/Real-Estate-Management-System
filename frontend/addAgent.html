<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Agent - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="owners.html">Owners</a>
                <a class="nav-link active" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link" href="properties.html">Properties</a>
                <a class="nav-link" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link" href="agreements.html">Agreements</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="mb-4">Add New Agent</h2>
                    <form id="agentForm">
                        <div class="mb-3">
                            <label class="form-label">Agent Name</label>
                            <input type="text" class="form-control" id="agentName" placeholder="Full Name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contact No</label>
                            <input type="text" class="form-control" id="agentContact" placeholder="Phone Number" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Commission Rate (%)</label>
                            <input type="number" step="0.01" class="form-control" id="agentCommission" placeholder="e.g. 2.5" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Agent</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
