<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytical Reports - EstatePro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🏠 EstatePro</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="owners.html">Owners</a>
                <a class="nav-link" href="agents.html">Agents</a>
                <a class="nav-link" href="buyers.html">Buyers</a>
                <a class="nav-link" href="properties.html">Properties</a>
                <a class="nav-link" href="listings.html">Listings</a>
                <a class="nav-link" href="visits.html">Visits</a>
                <a class="nav-link" href="bookings.html">Bookings</a>
                <a class="nav-link" href="payments.html">Payments</a>
                <a class="nav-link" href="agreements.html">Agreements</a>
                <a class="nav-link active" href="reports.html">Reports</a>
                <a class="nav-link" href="booking.html">Book Prop</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">System Insights & Reports</h2>
        
        <div class="row">
            <!-- Properties by Agent -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">Properties per Agent</div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead><tr><th>Agent Name</th><th>Total Properties</th></tr></thead>
                            <tbody id="agentReportBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Total Payments by Booking -->
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white">Total Payments Collection</div>
                    <div class="card-body">
                        <table class="table table-sm">
                            <thead><tr><th>Booking ID</th><th>Buyer</th><th>Total Paid (₹)</th></tr></thead>
                            <tbody id="paymentReportBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- High Budget Buyers -->
            <div class="col-12 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white">Premium Buyers (Budget > 1 Cr)</div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Buyer Name</th>
                                    <th>Contact</th>
                                    <th>Budget (₹)</th>
                                </tr>
                            </thead>
                            <tbody id="buyerReportBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
